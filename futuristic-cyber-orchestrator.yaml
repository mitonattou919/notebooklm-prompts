design_concept:
  name: "Futuristic Cyber-Orchestrator"
  version: "1.0"
  description: "A high-density, neon-infused layout representing a central AI hub controlling distributed agents."

global_styles:
  background:
    base_color: "#050A14"
    overlay: "Digital-grid-pattern"
    gradient: "Radial-glow from center (#102A43)"
  text_main:
    font_family: "Inter, Roboto, sans-serif"
    color: "#FFFFFF"
    weight: "Bold"
    text_shadow: "0 0 8px rgba(0, 242, 255, 0.8)"
  accent_colors:
    primary: "#00F2FF"
    secondary: "#FF8C00"
    tertiary: "#4D4DFF"

layout_rules:
  structure: "Hub-and-Spoke"
  central_element:
    shape: "Octagonal Glow Base"
    label: "Central Hub / Repository"
  panel_style:
    type: "Glassmorphism"
    opacity: 0.2
    border_color: "rgba(0, 242, 255, 0.5)"
    border_radius: "12px"
    blur: "10px"

diagram_specs:
  style: "3D Isometric Hybrid"
  connector:
    type: "Glowing Flow Arrows"
    dynamic_color: true
  icon_set:
    - category: "AI Agent"
      style: "Robotic / Android figure"
      glow: "Cyan"
    - category: "Human Developer"
      style: "Simple 3D Silhouette"
      glow: "White"
    - category: "Output"
      style: "Floating Code/Doc panels"

accents:
  background_elements: ["Binary code rain (subtle)", "Circuit traces", "Floating data nodes"]
  title_decoration: "Top-centered with double horizontal lines and 'System Status' metrics"