design_concept:
  name: "Minimalist Tech-Pro Flow"
  version: "1.0"

global_styles:
  background_color: "#FFFFFF"
  text_color: "#333333"
  accent_color: "#000000"
  font_family: "Modern Sans-serif"

layout_rules:
  header:
    alignment: "top-left"
    accent_symbol: "vertical-black-bar"
    title_style: "Bold"
  body:
    spacing: "wide"
    alignment: "left"

diagram_specs:
  style: "Flat Outline Icon"
  container:
    shape: "Rounded Rectangle"
    border_weight: "thin"
    border_color: "#333333"
  connection:
    type: "Fine-line Arrow"
  icon_set:
    - step: "input"
      label: "User Input"
      symbol: "Outline Human Figure"
    - step: "process"
      label: "Merge"
      symbol: "Fitting Puzzle Pieces"
    - step: "core"
      label: "LLM"
      symbol: "Text 'AI' inside box"

accents:
  top_right: "Hand-drawn 'namalab' symbol"
